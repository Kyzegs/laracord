name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - php: '8.3'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.3'
            laravel: '^13.0'
            testbench: '^11.0'
          - php: '8.4'
            laravel: '^12.0'
            testbench: '^10.0'
          - php: '8.4'
            laravel: '^13.0'
            testbench: '^11.0'
          - php: '8.5'
            laravel: '^13.0'
            testbench: '^11.0'
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: json, mbstring, sodium
          coverage: none
      - run: composer require "illuminate/cache:${{ matrix.laravel }}" "illuminate/collections:${{ matrix.laravel }}" "illuminate/config:${{ matrix.laravel }}" "illuminate/http:${{ matrix.laravel }}" "illuminate/notifications:${{ matrix.laravel }}" "illuminate/support:${{ matrix.laravel }}" "orchestra/testbench:${{ matrix.testbench }}" --no-interaction --no-update
      - run: composer update --prefer-dist --no-interaction --no-progress
      - run: composer validate --strict --no-check-lock
      - run: composer test
